<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding — Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Source+Sans+Pro:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }

    .cd-wrap {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      padding: 3rem 1rem 2.5rem;
      text-align: center;
      background: #faf9f6;
      border-bottom: 0.5px solid #d8d8d8;
    }

    .cd-wrap.visible { opacity: 1; transform: translateY(0); }

    .cd-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #1a1a1a;
      margin: 0 0 0.3rem;
    }

    .cd-subtitle {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #999;
      margin: 0 0 2rem;
    }

    .cd-units {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .cd-digits { display: flex; gap: 4px; }

    .cd-digit-wrap {
      position: relative;
      width: 52px;
      height: 68px;
      perspective: 200px;
    }

    .cd-card {
      position: absolute;
      inset: 0;
      background: #fff;
      border: 0.5px solid #d8d8d8;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .cd-card.peel {
      transform-origin: bottom center;
      animation: pagefall 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes pagefall {
      0%   { transform: rotateX(0deg) translateY(0px); opacity: 1; }
      40%  { transform: rotateX(-20deg) translateY(4px); opacity: 1; }
      100% { transform: rotateX(-90deg) translateY(40px) scaleY(0.3); opacity: 0; }
    }

    .cd-label {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #aaa;
      text-transform: uppercase;
    }

    .cd-sep {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: #d8d8d8;
      margin-top: 6px;
      line-height: 68px;
    }

    @media (max-width: 480px) {
      .cd-units { gap: 0.4rem; flex-wrap: nowrap; }
      .cd-digit-wrap { width: 32px; height: 48px; }
      .cd-card { font-size: 1.4rem; }
      .cd-digits { gap: 2px; }
      .cd-sep { font-size: 1.2rem; line-height: 48px; }
      .cd-label { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div class="cd-wrap" id="cdWrap">
    <p class="cd-title">The Countdown</p>
    <p class="cd-subtitle">20 June 2026 &mdash; St Anne's Church, Limehouse</p>

    <div class="cd-units">
      <div class="cd-unit">
        <div class="cd-digits">
          <div class="cd-digit-wrap"><div class="cd-card" id="d0">0</div></div>
          <div class="cd-digit-wrap"><div class="cd-card" id="d1">0</div></div>
        </div>
        <span class="cd-label">Days</span>
      </div>

      <div class="cd-sep">·</div>

      <div class="cd-unit">
        <div class="cd-digits">
          <div class="cd-digit-wrap"><div class="cd-card" id="h0">0</div></div>
          <div class="cd-digit-wrap"><div class="cd-card" id="h1">0</div></div>
        </div>
        <span class="cd-label">Hours</span>
      </div>

      <div class="cd-sep">·</div>

      <div class="cd-unit">
        <div class="cd-digits">
          <div class="cd-digit-wrap"><div class="cd-card" id="m0">0</div></div>
          <div class="cd-digit-wrap"><div class="cd-card" id="m1">0</div></div>
        </div>
        <span class="cd-label">Minutes</span>
      </div>

      <div class="cd-sep">·</div>

      <div class="cd-unit">
        <div class="cd-digits">
          <div class="cd-digit-wrap"><div class="cd-card" id="s0">0</div></div>
          <div class="cd-digit-wrap"><div class="cd-card" id="s1">0</div></div>
        </div>
        <span class="cd-label">Seconds</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var target = new Date('2026-06-20T12:00:00');
      var ids  = ['d0','d1','h0','h1','m0','m1','s0','s1'];
      var prev = ['','','','','','','',''];

      function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

      function animateDigit(id, newVal) {
        var el = document.getElementById(id);
        if (!el) return;
        var old = document.createElement('div');
        old.className = 'cd-card peel';
        old.textContent = el.textContent;
        el.parentNode.appendChild(old);
        el.textContent = newVal;
        setTimeout(function() { if (old.parentNode) old.parentNode.removeChild(old); }, 520);
      }

      function tick() {
        var now  = new Date();
        var diff = Math.max(0, target - now);
        var days    = Math.floor(diff / 86400000);
        var hours   = Math.floor((diff % 86400000) / 3600000);
        var minutes = Math.floor((diff % 3600000)  / 60000);
        var seconds = Math.floor((diff % 60000)    / 1000);

        var vals = [
          pad(days)[0],    pad(days)[1],
          pad(hours)[0],   pad(hours)[1],
          pad(minutes)[0], pad(minutes)[1],
          pad(seconds)[0], pad(seconds)[1]
        ];

        vals.forEach(function(v, i) {
          if (v !== prev[i]) {
            animateDigit(ids[i], v);
            prev[i] = v;
          }
        });
      }

      tick();
      setInterval(tick, 1000);

      var obs = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          document.getElementById('cdWrap').classList.add('visible');
          obs.disconnect();
        }
      }, { threshold: 0.1 });
      obs.observe(document.getElementById('cdWrap'));
    })();
  </script>

</body>
</html>
