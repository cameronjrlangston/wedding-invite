<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding — The Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Source+Sans+Pro:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }

    .sd-section {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      padding: 0 0 2rem 0;
      border-bottom: 0.5px solid #d8d8d8;
      overflow: hidden;
    }

    .sd-section.visible { opacity: 1; transform: translateY(0); }

    .sd-inner {
      font-family: 'Source Sans Pro', sans-serif;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .sd-heading {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 400; letter-spacing: 0.08em;
      text-align: center; color: #1a1a1a;
      margin: 0 0 0.3rem; line-height: 1.3;
    }

    .sd-divider {
      width: 40px; height: 0.5px;
      background: #d8d8d8;
      margin: 1rem auto 1.5rem;
    }

    .sd-main {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 2.5rem;
    }

    .sd-dial-col {
      flex: 0 0 360px;
      max-width: 360px;
    }

    .sd-info-col {
      flex: 1;
      min-width: 0;
      padding-top: 0.5rem;
    }

    /* Extra padding around SVG so labels at top don't clip */
    .sd-dial-wrap {
      position: relative;
      width: 100%;
      padding: 28px 28px 16px 28px;
    }

    .sd-dial-wrap svg { display: block; width: 100%; overflow: visible; }

    .sd-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.6rem;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      font-family: sans-serif;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: #999;
    }

    .sd-hint.visible { opacity: 1; transform: translateY(0); }

    .sd-hint .h-arrow span {
      display: block; width: 18px; height: 1px;
      background: #bbb; position: relative;
    }

    .sd-hint .h-arrow span::after {
      content: ''; position: absolute;
      right: 0; top: -3px; width: 6px; height: 6px;
      border-top: 1px solid #bbb; border-right: 1px solid #bbb;
      transform: rotate(45deg);
    }

    /* Fixed 3-line height detail card */
    .sd-detail {
      height: 120px;
      overflow: hidden;
      text-align: left;
      padding: 0.75rem 0;
      border-top: 0.5px solid #d8d8d8;
      border-bottom: 0.5px solid #d8d8d8;
      margin-bottom: 1.2rem;
      box-sizing: border-box;
    }

    .sd-detail-time  { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.1em; color: #074485; margin: 0 0 3px; }
    .sd-detail-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 500; color: #1a1a1a; margin: 0 0 5px; }
    .sd-detail-desc  { font-size: 13px; font-weight: 300; color: #444; line-height: 1.6; margin: 0 0 3px; }
    .sd-detail-loc   { font-size: 11px; color: #888; margin: 0; font-style: italic; }

    /* List: flow down first column, then second */
    .sd-list {
      border-top: 0.5px solid #d8d8d8;
      columns: 2;
      column-gap: 1.5rem;
      column-fill: auto;
    }

    .sd-list-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 0.5px solid #ede9e2;
      cursor: pointer;
      break-inside: avoid;
    }

    .sd-list-item.active .sd-list-time,
    .sd-list-item.active .sd-list-name { color: #074485; }

    .sd-list-time { font-family: 'Cinzel', serif; font-size: 10px; color: #999; letter-spacing: 0.05em; white-space: nowrap; transition: color 0.2s; }
    .sd-list-name { font-family: 'Cinzel', serif; font-size: 10px; color: #333; line-height: 1.3; transition: color 0.2s; }

    @media (max-width: 680px) {
      .sd-main { flex-direction: column; align-items: center; gap: 0; }
      .sd-dial-col { flex: none; width: 100%; max-width: 360px; }
      .sd-info-col { width: 100%; padding-top: 1rem; }
      .sd-detail { text-align: center; }
    }
  </style>
</head>
<body>

  <div class="sd-section" id="sdSection">
    <div class="sd-inner">

      <h2 class="sd-heading">The Day</h2>
      <div class="sd-divider"></div>

      <div class="sd-main">

        <div class="sd-dial-col">
          <div class="sd-dial-wrap">
            <svg id="sdSvg" viewBox="-20 -20 380 380" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <clipPath id="sdDialClip"><circle cx="170" cy="170" r="130"/></clipPath>
                <filter id="shadowFilter" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="rgba(20,10,0,0.5)"/>
                </filter>
              </defs>

              <image href="https://www.dropbox.com/scl/fi/stwlw73525wv3ln9ne4hs/sundial.png?rlkey=9pul5f59bkkc5xco81bqdb4ks&st=413zfjvz&raw=1"
                x="40" y="40" width="260" height="260"
                clip-path="url(#sdDialClip)"
                preserveAspectRatio="xMidYMid slice"/>

              <circle cx="170" cy="170" r="130" fill="none" stroke="#c4a96a" stroke-width="1.5"/>

              <!-- Gnomon shadow polygon, rotated by JS -->
              <polygon id="sdShadow"
                points="170,170 164,50 176,50"
                fill="rgba(35,20,5,0.5)"
                filter="url(#shadowFilter)"
                stroke="none"/>



              <g id="sdMarkers"></g>
            </svg>
          </div>

          <div class="sd-hint" id="sdHint">
            tap a time to learn more
            <div class="h-arrow"><span></span></div>
          </div>
        </div>

        <div class="sd-info-col">
          <div id="sdDetail" class="sd-detail">
            <p class="sd-detail-time"  id="sdDetailTime"></p>
            <p class="sd-detail-title" id="sdDetailTitle"></p>
            <p class="sd-detail-desc"  id="sdDetailDesc"></p>
            <p class="sd-detail-loc"   id="sdDetailLoc"></p>
          </div>
          <div class="sd-list" id="sdListEl"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
  (function() {

    var events = [
      { time:"11:30am", title:"Guest Arrivals",        desc:"Please arrive promptly at St Anne's Church for 11:30am. Ushers will be on hand to welcome you and show you to your seats.", loc:"St Anne's Church, Limehouse" },
      { time:"12:00pm", title:"Wedding Ceremony",      desc:"IT'S TIME FOR THE MAIN EVENT!", loc:"St Anne's Church (Main Church)" },
      { time:"1:30pm",  title:"Picnic Reception",      desc:"After the ceremony, you will be guided to the gated garden where a picnic reception awaits. Enjoy food, drinks and good company.", loc:"St Anne's Church (Gated Garden)" },
      { time:"3:00pm",  title:"Speeches",              desc:"Get your glasses ready - it's time for the speeches!", loc:"St Anne's Church (Gated Garden)" },
      { time:"4:00pm",  title:"Cake Cutting",          desc:"Cam & Gem cut the wedding cake and it's time for sweet treats!", loc:"St Anne's Church (Gated Garden)" },
      { time:"4:30pm",  title:"First Dance",           desc:"Let's celebrate! Join Cam & Gem on the dancefloor.", loc:"St Anne's Church (Gated Garden)" },
      { time:"6:30pm",  title:"Bride & Groom Exit",   desc:"Make an arch guys!", loc:"St Anne's Church (Main Church)" },
      { time:"7:30pm",  title:"Private Family Dinner", desc:"The family & bridal party will join Cam & Gem for a private dinner and spend some time together before the honeymoon.", loc:"Star of the East Pub - Upstairs Room" },
    ];

    /*
      Sundial angle mapping based on the provided reference table.
      The sundial uses non-linear hour angles (not 30deg/hr like a clock).
      Reference angles from noon (top of dial = 0deg):
        12:00 =   0 deg
         1:00 =  12 deg right
         2:00 =  25 deg right
         3:00 =  41 deg right
         4:00 =  62 deg right
         5:00 =  90 deg right  (horizontal)
         6:00 = 125 deg right  (bottom corner)
        11:00 = -12 deg (left of noon)
        10:00 = -25 deg
         9:00 = -41 deg
    */
    var hourAngles = {
      9:  -41,
      10: -25,
      11: -12,
      12:   0,
      13:  12,
      14:  25,
      15:  41,
      16:  62,
      17:  90,
      18: 125,
      19: 145,
    };

    function parseHour24(timeStr) {
      var m = timeStr.match(/(\d+):(\d+)(am|pm)/i);
      var h = parseInt(m[1]);
      var min = parseInt(m[2]);
      var ampm = m[3].toLowerCase();
      if (ampm === 'pm' && h !== 12) h += 12;
      if (ampm === 'am' && h === 12) h = 0;
      return h + min / 60;
    }

    function interpolateAngle(h24) {
      /* Find surrounding integer hours and interpolate */
      var hLow  = Math.floor(h24);
      var hHigh = Math.ceil(h24);
      var frac  = h24 - hLow;

      var aLow  = hourAngles[hLow];
      var aHigh = hourAngles[hHigh];

      if (aLow === undefined && aHigh === undefined) return 0;
      if (aLow  === undefined) return aHigh;
      if (aHigh === undefined) return aLow;

      return aLow + (aHigh - aLow) * frac;
    }

    /* Convert sundial angle (degrees from noon, positive = right/PM)
       to SVG rotation angle.
       Noon = top of circle = -90deg in standard SVG math.
       So SVG angle = sundialAngle - 90  ... but we use rotate() on the
       shadow which already rotates around the centre, so we just pass
       the sundial angle directly. */
    function sundialAngleToSVG(sdAngle) {
      /* In our SVG coordinate system:
         0deg = right (3 o'clock position)
         -90deg = top (noon)
         So to point to noon: rotate = -90
         To point to 1pm (12deg from noon): rotate = -90 + 12 = -78
      */
      return sdAngle - 90;
    }

    function angleToXY(svgAngle, radius) {
      var rad = svgAngle * Math.PI / 180;
      return {
        x: 170 + radius * Math.cos(rad),
        y: 170 + radius * Math.sin(rad)
      };
    }

    var cx = 170, cy = 170;
    var dotR   = 148;
    var labelR = 165;
    var shadow   = document.getElementById('sdShadow');
    var markersG = document.getElementById('sdMarkers');
    var listEl   = document.getElementById('sdListEl');
    var sdSection= document.getElementById('sdSection');
    var sdHint   = document.getElementById('sdHint');
    var current  = 0;

    function buildMarkers() {
      markersG.innerHTML = '';
      events.forEach(function(ev, i) {
        var h24     = parseHour24(ev.time);
        var sdAngle = interpolateAngle(h24);
        var svgAngle= sundialAngleToSVG(sdAngle);
        var dotPos  = angleToXY(svgAngle, dotR);
        var labelPos= angleToXY(svgAngle, labelR);

        var g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.style.cursor = 'pointer';

        /* dot */
        var dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx', dotPos.x); dot.setAttribute('cy', dotPos.y);
        dot.setAttribute('r', '6');
        dot.setAttribute('fill', i === 0 ? '#074485' : '#fff');
        dot.setAttribute('stroke', i === 0 ? '#074485' : '#c4a96a');
        dot.setAttribute('stroke-width', '1.5');
        dot.id = 'sdDot' + i;
        g.appendChild(dot);

        /* label — anchor based on left/right of dial */
        var anchor = sdAngle > 5 ? 'start' : (sdAngle < -5 ? 'end' : 'middle');
        var tx = document.createElementNS('http://www.w3.org/2000/svg','text');
        tx.setAttribute('x', labelPos.x);
        tx.setAttribute('y', labelPos.y + 4);
        tx.setAttribute('text-anchor', anchor);
        tx.setAttribute('font-family','Cinzel,serif');
        tx.setAttribute('font-size','8');
        tx.setAttribute('fill', i === 0 ? '#074485' : '#7a6a50');
        tx.setAttribute('letter-spacing','0.03em');
        tx.id = 'sdTx' + i;
        tx.textContent = ev.time;
        g.appendChild(tx);

        g.addEventListener('click', function() { selectEvent(i); });
        markersG.appendChild(g);
      });
    }

    function buildList() {
      listEl.innerHTML = '';
      events.forEach(function(ev, i) {
        var item = document.createElement('div');
        item.id = 'sdItem' + i;
        item.className = 'sd-list-item' + (i === 0 ? ' active' : '');
        item.innerHTML =
          '<span class="sd-list-time" id="sdItemTime'+i+'">'+ev.time+'</span>' +
          '<span class="sd-list-name" id="sdItemName'+i+'">'+ev.title+'</span>';
        item.addEventListener('click', function() { selectEvent(i); });
        listEl.appendChild(item);
      });
      /* Set explicit height so columns fill top-to-bottom */
      listEl.style.height = (Math.ceil(events.length / 2) * 31) + 'px';
    }

    function updateShadow(h24) {
      var sdAngle = interpolateAngle(h24);
      /* Shadow polygon rotates around centre (170,170).
         The polygon points straight up by default (noon = 0deg sundial).
         We rotate by sdAngle degrees — positive = clockwise = afternoon. */
      shadow.setAttribute('transform', 'rotate(' + sdAngle + ' 170 170)');
    }

    function selectEvent(i) {
      current = i;
      for (var j = 0; j < events.length; j++) {
        var d  = document.getElementById('sdDot' + j);
        var t  = document.getElementById('sdTx' + j);
        var ti = document.getElementById('sdItemTime' + j);
        var ni = document.getElementById('sdItemName' + j);
        var it = document.getElementById('sdItem' + j);
        if (d) {
          d.setAttribute('fill', j === i ? '#074485' : '#fff');
          d.setAttribute('stroke', j === i ? '#074485' : '#c4a96a');
        }
        if (t)  t.setAttribute('fill', j === i ? '#074485' : '#7a6a50');
        if (ti) ti.style.color = j === i ? '#074485' : '#999';
        if (ni) ni.style.color = j === i ? '#074485' : '#333';
        if (it) it.className = 'sd-list-item' + (j === i ? ' active' : '');
      }
      updateShadow(parseHour24(events[i].time));
      var ev = events[i];
      document.getElementById('sdDetailTime').textContent  = ev.time;
      document.getElementById('sdDetailTitle').textContent = ev.title;
      document.getElementById('sdDetailDesc').textContent  = ev.desc;
      document.getElementById('sdDetailLoc').textContent   = ev.loc;
    }

    buildMarkers();
    buildList();
    selectEvent(0);

    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        sdSection.classList.add('visible');
        setTimeout(function() { sdHint.classList.add('visible'); }, 800);
        obs.disconnect();
      }
    }, { threshold: 0 });
    obs.observe(sdSection);

  })();
  </script>

</body>
</html>
